<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <title>La tua libreria</title>
</head>

<body>
    <div class="container">
        <div class="option">
            <div class="left-option">
                <button class="btn-icon">M</button>
                <h2>La tua libreria</h2>
            </div>
            <div class="right-option">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
                <button><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>

        <div class="choise">
            <button>Playlist</button>
            <button>Album</button>
            <button>Artisti</button>
        </div>
        <hr class="divider">
        <div class="mid-zone">
            <div class="left">
                <button><i class="fa-solid fa-up-down"></i></button>
                <h5>Recenti</h5>
            </div>
            <div class="right">
                <button><i class="fa-solid fa-table-cells-large"></i></button>
            </div>
        </div>
         <div class="box-item">
            <img src="like.jpg" class="box-cover">
            <div class="box-info">
                <span class="box-title">Brani che ti piacciono</span>
            </div>
        </div>
         <div class="box-item">
            <button class="box-cover-circle"><i class="fa-solid fa-plus"></i></button>
            <div class="box-info">
                <span class="box-title">Aggiungi artisti</span>
            </div>
        </div>
         <div class="box-item">
            <button class="box-cover"><i class="fa-solid fa-plus"></i></button>
            <div class="box-info">
                <span class="box-title">Aggiungi podcast</span>
            </div>
        </div>
         <div class="box-item">
            <button class="box-cover"><i class="fa-solid fa-plus"></i></button>
            <div class="box-info">
                <span class="box-title">Aggiungi eventi e luoghi</span>
            </div>
        </div>
          <div class="box-item">
            <button class="box-cover"><i class="fa-solid fa-download"></i></button>
            <div class="box-info">
                <span class="box-title">Importa la tua musica</span>
            </div>
        </div>
    </div>

</body>

</html>

<style>
    body,
    html {
        width: 100%;
        height: 100%;
        margin: 0;
        background-color: #121212;
        font-family: 'Montserrat', sans-serif;
    }


    .top-zone {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
    }

    .left-option {
        display: flex;
        align-items: center;
        gap: 15px;
        white-space: nowrap;
    }

    .btn-icon {
        width: 35px;
        height: 30px;
        border-radius: 50%;
        background-color: rgb(250, 175, 250);
        border: none;
        color: #121212;
        font-weight: bold;
        font-size: 18px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-left: 6%;
    }

    .left-option h2 {
        color: white;
    }

    .option {
        display: flex;
        justify-content: space-between;
    }

    .right-option button {
        font-size: 25px;
        color: white;
        border: none;
        background-color: transparent;
    }

    .right-option {
        display: flex;
        margin-right: 3%;
        gap: 7px;
        align-items: center;
    }

    .choise {
        margin-left: 3%;
    }

    .choise button {
        border-radius: 20px;
        padding: 2%;
        margin-right: 1%;
        background-color: rgb(70, 70, 70);
        color: white;
        border: none;
    }

    .divider {
        border: none;
        height: 2px;
        margin-top: 1%;
        margin-bottom: 0;
        background-color: black;
    }

    .left button {
        background-color: transparent;
        border: none;
        color: white;
    }
    .right button{
        background-color: transparent;
        border: none;
        color: white;
    }
    .mid-zone{
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .left{
        display: flex;
        color: white;
        margin-left: 2%; 
    }
    .right{
        display: flex;
        margin-right: 2%;
    }
     .box-item {
        display: flex;
        align-items: center;
        padding: 10px 16px;
        gap: 12px;
        cursor: pointer;
    }
    .box-item button{
        background-color: #3d3d3d;
        border: none;
        color: rgb(173, 173, 173);
    }
    .box-item i{
        font-size: x-large;
    }

    .box-cover {
        width: 56px;
        height: 56px;
        border-radius: 4px;
        object-fit: cover;
    }
    .box-cover-circle {
        width: 55px;
        height: 55px;
        border-radius: 50%;
        object-fit: cover
    }

    .box-info {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .box-title {
        margin-bottom: 5%;
        color: white;
        font-weight: bold;
        font-size: 14px;
    }

   

</style>
