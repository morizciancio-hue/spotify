<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log-In</title>
</head>

<body>

    <div id="splash-screen">
        <div class="logo-container">
            <img src="spotify-bianco.jpg" alt="Logo" class="splash-logo">
        </div>
    </div>
    <div class="container" style="display: none;">
        <div class="top-zone">
            <div class="logo">
                <img src="spotify-bianco.jpg" id="image">
            </div>
            <div class="title">
                <h1>Milions of songs.<br>Free on Spotify.</h1>
            </div>
        </div>
        <div class="Sign-in">
            <button id="green">
                <span>Sign up free</span>
            </button>
            <button class="btn">
                <img src="Google.jpg" id="Google">
                <span>Continue with Google</span>
            </button>
            <button class="btn">
                <img src="facebook1.jpg" id="Facebook1">
                <span>Continue with Facebook</span>
            </button>
            <button class="btn">
                <img src="apple.jpg" id="Apple">
                <span>Continue with Apple</span>
            </button>
        </div>
        <div class="Log-in">
            <a href="accesso.html">Log in</a>
        </div>
    </div>
</body>

</html>
<style>
    body,
    html {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: black;
        font-family: 'Montserrat', sans-serif;
        overflow: hidden;
    }

    .logo img {
        height: 15%;
        width: 28%;
    }

    .Sign-in #Google {
        width: 12%;
        height: 12%;

    }

    .Sign-in #Facebook1 {
        max-width: 13%;
        max-height: 13%;
    }

    .Sign-in #Apple {
        height: 12%;
        width: 12%;
    }

    .container #image {
        position: absolute;
        left: 35%;
        top: 11%;
    }

    .container h1 {
        color: white;
        text-align: center;
    }

    .title {
        margin-top: 15em;
        margin-bottom: 5em;
    }

    .container {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }



    .Sign-in {
        display: flex;
        flex-direction: column;
        justify-items: center;
        align-items: center;
        margin-top: 5%;
    }



    .Sign-in #green {
        background-color: rgb(29, 185, 84);
        color: black;
        margin-top: 2%;
        padding: 4%;
        margin-left: 15%;
        margin-right: 15%;
    }

    .btn {
        display: flex;
        align-items: center;
        gap: 14%;
    }


    .Sign-in button {
        margin-top: 2%;
        padding: 2%;
        margin-left: 20%;
        margin-right: 20%;
        white-space: nowrap;
        border: 1px solid #727272;
        border-radius: 500px;
        color: white;
        background-color: black;
        font-weight: bold;
        width: 80%;
    }



    .Log-in {
        margin-top: 6%;
        text-align: center;
    }



    .Log-in a {
        color: white;
        background-color: black;
        font-size: 1em;
        border: none;
        font-weight: bold;
        text-decoration: none;
        align-items: center;
    }



    #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
    }



    .splash-logo {
        width: 150px;
        animation: pulse 1.5s infinite ease-in-out;
    }



    @keyframes pulse {
        0% {
            transform: scale(0.9);
            opacity: 0.7;
        }

        50% {
            transform: scale(1);
            opacity: 1;
        }

        100% {
            transform: scale(0.9);
            opacity: 0.7;
        }
    }
    .fade-out {
        opacity: 0;
        pointer-events: none;
    }
</style>



<script>

    window.addEventListener('load', () => {
        const splash = document.getElementById('splash-screen');
        const container = document.querySelector('.container');
        setTimeout(() => {
            splash.classList.add('fade-out');
            container.style.display = 'block';
            setTimeout(() => {
                splash.remove();
            }, 500);
        }, 3000);
    });
</script>
