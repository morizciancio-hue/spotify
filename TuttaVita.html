<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <title>Tutta Vita</title>
</head>

<body>
    <div class="conatiner">
        <div class="image">
            <img src="tutta-vita.jpg" class="img">
            <div class="album-details">
                <div class="title">
                    <span>TUTTA VITA</span>
                </div>
                <div class="artist">
                    <img src="Olly.jpg">
                    <img src="juli.jpg">
                    <h5>Olly°Juli</h5>
                </div>
                <div class="description">
                    <h5>Album * 25 ott 2024</h5>
                </div>
            </div>

            <div class="option">
                <div class="left-option">
                    <button><i class="fa-solid fa-circle-plus"></i></button>
                    <button><i class="fa-solid fa-circle-down"></i></button>
                    <button><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
                <div class="right-option">
                    <button><i class="fa-solid fa-shuffle"></i></button>
                    <button><i class="fa-solid fa-circle-play" id="special-button"></i></button>
                </div>
            </div>
        </div>

       <div id="song-list"></div>


        <div class="song-bar" id="Song-Bar" style="display:none;">
            <div class="song-left">
                <img id="song-img" src="tutta-vita.jpg">
                <div>
                    <div id="song-title"></div>
                    <div id="song-artist">Olly</div>
                </div>
            </div>
            <div class="song-control">
                <button id="btn" onclick="togglePlay()">▶</button>
            </div>
            <div class="progress-container">
                <div class="progress"></div>
            </div>
        </div>
    </div>

    <audio id="play-song" preload="metadata"></audio>



</body>

<style>
    body,
    html {
        width: 100%;
        height: 142%;
        margin: 0;
        background-color: #121212;
        margin-bottom: 80px;
        background: linear-gradient(to bottom, #d8f6d2 0%, #121212 18%);
        font-family: 'Montserrat', sans-serif;
    }

    .image {
        margin-top: 5%;
        text-align: center;
        width: 100%;
        padding: 20px 0;
    }

    .image img {
        width: 13em;
    }

    .title {
        margin-top: 5%;
        margin-left: 3%;
        color: white;
        text-align: left;
        font-size: x-large;
    }

    .artist {
        display: flex;
    }

    .artist img {
        margin-top: 5%;
        margin-left: 3%;
        width: 1em;
        height: 1em;
        border-radius: 50%;
        object-fit: cover
    }

    .artist h5 {
        color: white;
        margin-left: 3%;
        margin-top: 5%;
    }

    .description {
        color: white;
        display: flex;
        margin-left: 3%;
    }

    .option button {
        background-color: transparent;
        border: none;
    }

    .left-option i {
        color: grey;
        font-size: 25px;
    }

    .option {
        display: flex;
        justify-content: space-between;
    }

    .left-option {
        display: flex;
        margin-left: 10%;
        gap: 20%;
    }

    .right-option i {
        font-size: 25px;
        color: rgb(83, 246, 124);
    }

    .right-option {
        display: flex;
        margin-right: 2%;
    }

    .right-option #special-button {
        font-size: 40px;
    }

    .song-item {
        display: flex;
        align-items: center;
        padding: 10px 16px;
        gap: 12px;
        cursor: pointer;
    }

    .song-cover {
        width: 48px;
        height: 48px;
        border-radius: 4px;
        object-fit: cover;
    }

    .song-info {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .song-title {
        color: white;
        font-size: 14px;
    }

    .song-artist {
        color: #b3b3b3;
        font-size: 12px;
    }

    .song-options button {
        color: rgb(70, 70, 70);
        font-size: xx-large;
        border: none;
        background-color: #121212;
    }

    .song-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 80px;
        background-color: #181818;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 16px;
        border-top: 1px solid #282828;
    }

    .song-left {
        display: flex;
        align-items: center;
        gap: 12px;
        color: white;
        font-size: small;
    }

    .song-left img {
        width: 48px;
        height: 48px;
        border-radius: 4px;
    }

    .song-control button {
        font-size: 22px;
        background: none;
        border: none;
        color: white;
        cursor: pointer;
    }

    .progress-container {
        position: absolute;
        bottom: 8px;
        left: 16px;
        right: 16px;
        height: 4px;
        background: #404040;
        border-radius: 2px;
        cursor: pointer;
    }

    .progress {
        height: 100%;
        width: 0%;
        background: white;
        border-radius: 2px;
    }
</style>

<script>
    const play_song = document.getElementById("play-song");
    const btn = document.getElementById("btn");
    const songBar = document.getElementById("Song-Bar");

    // Array dei brani
    const songs = [
        { title: "E festa", file: "È festa.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "I cantieri del Giappone", file: "Icantieridelgiappone.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Per due come noi", file: "Perduecomenoi.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Quei ricordi là", file: "Queiricordila.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Noi che", file: "Noiche.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Devastante", file: "Devastante.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "A noi non serve far l'amore", file: "Anoinonservefarlamore.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Sopra la stessa barca", file: "Sopralastessabarca.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "La lavatrice si è rotta", file: "Lalavatricesierotta.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Scarabocchi", file: "Scarabocchi.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "A squarciagola", file: "Asquarciagola.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Il campione", file: "Ilcampione.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Depresso fortunato", file: "Depressofortunato.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Questa domenica", file: "Questadomenica.mp3", cover: "tutta-vita.jpg", artist: "Olly" }
    ];

    const songList = document.getElementById("song-list");

    // Genera gli elementi dei brani
    songs.forEach(song => {
        const songItem = document.createElement("div");
        songItem.classList.add("song-item");

        songItem.innerHTML = `
            <img src="${song.cover}" class="song-cover" loading="lazy">
            <div class="song-info">
                <span class="song-title">${song.title}</span>
                <span class="song-artist">${song.artist}</span>
            </div>
            <div class="song-options"><button>⋮</button></div>
        `;

        songItem.onclick = () => playTrack(song.title, song.file, song.cover);
        songList.appendChild(songItem);
    });

    function playTrack(title, fileName, cover) {
        songBar.style.display = "flex";
        document.getElementById("song-title").innerText = title;
        document.getElementById("song-img").src = cover;

        if (!play_song.src.includes(encodeURIComponent(fileName))) {
            play_song.src = fileName;
            play_song.load();
        }

        play_song.play();
        btn.innerText = "⏸";
    }

    function togglePlay() {
        if (play_song.paused) {
            play_song.play();
            btn.innerText = "⏸";
        } else {
            play_song.pause();
            btn.innerText = "▶";
        }
    }

    const progress = document.querySelector(".progress");
    const progressContainer = document.querySelector(".progress-container");

    play_song.addEventListener("timeupdate", () => {
        const percent = (play_song.currentTime / play_song.duration) * 100;
        progress.style.width = percent + "%";
    });

    progressContainer.addEventListener("click", (e) => {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        const duration = play_song.duration;
        play_song.currentTime = (clickX / width) * duration;
    });
</script>


</html>
