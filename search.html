<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="search.css">
</head>

<body>
    <div class="container">
        <!-- Top bar -->
        <div class="top-zone">
            <a href="Cerca.html"><button id="back"><i class="fa-solid fa-arrow-left"></i></button></a>
            <input type="text" id="searchInput" placeholder="Cerca canzoni, artisti, podcast...">
        </div>

        <!-- Risultati ricerca -->
        <div id="song-list" class="song-list"></div>

        <!-- Song bar -->
        <div class="song-bar" id="Song-Bar" style="display:none;">
            <div class="song-left">
                <img id="song-img">
                <div>
                    <div id="song-title"></div>
                    <div id="song-artist"></div>
                </div>
            </div>
            <div class="song-control">
                <button id="btn" onclick="togglePlay()">▶</button>
            </div>
            <div class="progress-container">
                <div class="progress"></div>
            </div>
        </div>
    </div>

    <audio id="play-song"></audio>
</body>

</html>

<style>
    body,
    html {
        width: 100%;
        height: 100%;
        margin: 0;
        background-color: #121212;
        font-family: 'Montserrat', sans-serif;
        color: white;
    }

    .top-zone {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
    }

    #back {
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
    }

    #searchInput {
        flex: 1;
        padding: 8px 12px;
        border-radius: 20px;
        border: none;
        outline: none;
        font-size: 16px;
        background-color: #282828;
        color: white;
    }

    .song-list {
        margin-top: 12px;
    }

    .song-item {
        display: flex;
        align-items: center;
        padding: 10px 16px;
        gap: 12px;
        cursor: pointer;
    }

    .song-cover {
        width: 48px;
        height: 48px;
        border-radius: 4px;
        object-fit: cover;
    }

    .song-info {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .song-title {
        color: white;
        font-size: 14px;
    }

    .song-artist {
        color: #b3b3b3;
        font-size: 12px;
    }

    .song-options button {
        color: rgb(70, 70, 70);
        background: #121212;
        font-size: xx-large;
        border: none;
    }

    .song-bar {
        position: fixed;
        bottom: 64px;
        left: 0;
        right: 0;
        height: 80px;
        background-color: #181818;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 16px;
        border-top: 1px solid #282828;
    }

    .song-left {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .song-left img {
        width: 48px;
        height: 48px;
        border-radius: 4px;
    }

    .song-control button {
        font-size: 22px;
        background: none;
        border: none;
        color: white;
        cursor: pointer;
    }

    .progress-container {
        position: absolute;
        bottom: 8px;
        left: 16px;
        right: 16px;
        height: 4px;
        background: #404040;
        border-radius: 2px;
        cursor: pointer;
    }

    .progress {
        height: 100%;
        width: 0%;
        background: white;
        border-radius: 2px;
    }
</style>

<script>
    // ELEMENTI
    const play_song = document.getElementById("play-song");
    const btn = document.getElementById("btn");
    const songBar = document.getElementById("Song-Bar");
    const songList = document.getElementById("song-list");
    const searchInput = document.getElementById("searchInput");

    // ARRAY DELLE CANZONI
    const songs = [
        { title: "Buio Davanti", file: "Lazza - BUIO DAVANTI (Visual).mp3", cover: "buio-davanti1.jpg", artist: "Lazza" },
        { title: "Fellini", file: "Ernia, Kid Yugi - FELLINI (Visual).mp3", cover: "Fellini.jpg", artist: "Ernia, Kid Yugi" },
        { title: "Kabuki", file: "Kabuki.mp3", cover: "kabuki.jpg", artist: "Kid Yugi" },
        { title: "E festa", file: "È festa.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "I cantieri del Giappone", file: "Icantieridelgiappone.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Per due come noi", file: "Perduecomenoi.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Quei ricordi là", file: "Queiricordila.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Noi che", file: "Noiche.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Devastante", file: "Devastante.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "A noi non serve far l'amore", file: "Anoinonservefarlamore.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Sopra la stessa barca", file: "Sopralastessabarca.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "La lavatrice si è rotta", file: "Lalavatricesierotta.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Scarabocchi", file: "Scarabocchi.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "A squarciagola", file: "Asquarciagola.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Il campione", file: "Ilcampione.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Depresso fortunato", file: "Depressofortunato.mp3", cover: "tutta-vita.jpg", artist: "Olly" },
        { title: "Questa domenica", file: "Questadomenica.mp3", cover: "tutta-vita.jpg", artist: "Olly" }
    ];

    // FUNZIONE PER MOSTRARE LE CANZONI
    function renderSongs(list) {
        songList.innerHTML = "";
        list.forEach(song => {
            const songItem = document.createElement("div");
            songItem.classList.add("song-item");
            songItem.innerHTML = `
            <img src="${song.cover}" class="song-cover" loading="lazy">
            <div class="song-info">
                <span class="song-title">${song.title}</span>
                <span class="song-artist">${song.artist}</span>
            </div>
            <div class="song-options"><button>⋮</button></div>
        `;
            songItem.onclick = () => playTrack(song.title, song.file, song.cover);
            songList.appendChild(songItem);
        });
    }

    // FUNZIONE DI RICERCA IN TEMPO REALE
    searchInput.addEventListener("input", () => {
        const query = searchInput.value.toLowerCase().trim();
        if (query === "") {
            songList.innerHTML = ""; // Nessuna canzone mostrata se la barra è vuota
            return;
        }
        const results = songs.filter(song => song.title.toLowerCase().includes(query));
        renderSongs(results);
    });

    // FUNZIONE PER RIPRODURRE LA CANZONE
    function playTrack(title, fileName, cover) {
        songBar.style.display = "flex";
        document.getElementById("song-title").innerText = title;
        document.getElementById("song-img").src = cover;

        if (!play_song.src.includes(encodeURIComponent(fileName))) {
            play_song.src = fileName;
            play_song.load();
        }

        play_song.play();
        btn.innerText = "⏸";
    }

    // FUNZIONE PLAY/PAUSA
    function togglePlay() {
        if (play_song.paused) {
            play_song.play();
            btn.innerText = "⏸";
        } else {
            play_song.pause();
            btn.innerText = "▶";
        }
    }

    // PROGRESSO
    const progress = document.querySelector(".progress");
    const progressContainer = document.querySelector(".progress-container");

    play_song.addEventListener("timeupdate", () => {
        const percent = (play_song.currentTime / play_song.duration) * 100;
        progress.style.width = percent + "%";
    });

    progressContainer.addEventListener("click", (e) => {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        const duration = play_song.duration;
        play_song.currentTime = (clickX / width) * duration;
    });

    // REDIRECT SE NON LOGGATO
    if (localStorage.getItem("loggedIn") !== "true") {
        window.location.href = "index.html";
    }


</script>
