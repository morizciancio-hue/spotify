<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="top-zone">
            <a href="Cerca.html"><button id="back"><i class="fa-solid fa-arrow-left"></i></button></a>
            <input type="text" id="searchInput" placeholder="Cerca canzoni, artisti, podcast...">
        </div>

        <div id="song-list" class="song-list"></div>

        <div class="song-bar" id="Song-Bar" style="display:none;">
            <div class="song-left">
                <img id="song-img">
                <div class="song-details">
                    <div id="song-title"></div>
                    <div id="song-artist"></div>
                </div>
            </div>
            <div class="song-control">
                <button id="btn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
            </div>
            <div class="progress-container">
                <div class="progress"></div>
            </div>
        </div>

    </div>

    <audio id="play-song"></audio>

    <script src="js/search.js"></script>
</body>


</html>

<style>
    body,
    html {
        width: 100%;
        height: 100%;
        margin: 0;
        background-color: #121212;
        font-family: 'Montserrat', sans-serif;
        color: white;
    }

    .top-zone {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
    }

    #back {
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
    }

    #searchInput {
        flex: 1;
        padding: 8px 12px;
        border-radius: 20px;
        border: none;
        outline: none;
        font-size: 16px;
        background-color: #282828;
        color: white;
    }

    .song-list {
        margin-top: 12px;
    }

    .song-item {
        display: flex;
        align-items: center;
        padding: 10px 16px;
        gap: 12px;
        cursor: pointer;
    }

    .song-cover {
        width: 48px;
        height: 48px;
        border-radius: 4px;
        object-fit: cover;
    }

    .song-info {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .song-title {
        color: white;
        font-size: 14px;
    }

    .song-artist {
        color: #b3b3b3;
        font-size: 12px;
    }

    .song-options button {
        color: rgb(70, 70, 70);
        background: #121212;
        font-size: xx-large;
        border: none;
    }

    .song-bar {
        position: fixed;
        bottom: 75px;
        left: 10px;
        right: 10px;
        height: 56px;
        background-color: #1b1b1b;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 12px;
        border-radius: 8px;
    }

    .song-left {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 70%;
        overflow: hidden;
    }

    .song-left img {
        width: 40px;
        height: 40px;
        border-radius: 4px;
    }

    .song-details {
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    #song-title {
        color: white;
        font-size: 13px;
        font-weight: bold;
        white-space: nowrap;
    }

    #song-artist {
        color: #b3b3b3;
        font-size: 11px;
    }

    .song-control button {
        background: none;
        border: none;
        color: white;
        font-size: 20px;
        cursor: pointer;
    }

    .progress-container {
        position: absolute;
        bottom: 0;
        left: 10px;
        right: 10px;
        height: 2px;
        background: rgba(255, 255, 255, 0.1);
    }

    .progress {
        height: 100%;
        width: 0%;
        background: white;
        transition: width 0.1s;
    }
</style>
