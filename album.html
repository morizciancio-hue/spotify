<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <title>Album</title>
</head>

<body>
    <div class="container">

        <!-- BACK -->
        <a href="app.html" class="back-arrow">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <!-- HEADER ALBUM -->
        <div class="image">
            <img src="" class="img">
            <div class="album-details">
                <div class="title">
                    <span></span>
                </div>

                <div class="description">
                    <h5>Album</h5>
                </div>
            </div>

            <div class="option">
                <div class="left-option">
                    <button><i class="fa-solid fa-circle-plus"></i></button>
                    <button><i class="fa-solid fa-circle-down"></i></button>
                    <button><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
                <div class="right-option">
                    <button><i class="fa-solid fa-shuffle"></i></button>
                    <button><i class="fa-solid fa-circle-play" id="special-button"></i></button>
                </div>
            </div>
        </div>

        <!-- LISTA CANZONI -->
        <div id="song-list"></div>

        <!-- PLAYER -->
        <div class="song-bar" id="Song-Bar" style="display:none;">
            <div class="song-left">
                <img id="song-img">
                <div class="song-details">
                    <div id="song-title"></div>
                    <div id="song-artist"></div>
                </div>
            </div>
            <div class="song-control">
                <button id="btn" onclick="togglePlay()">
                    <i class="fas fa-play"></i>
                </button>
            </div>
            <div class="progress-container">
                <div class="progress"></div>
            </div>
        </div>

    </div>

    <audio id="play-song" preload="metadata"></audio>

    <!-- JS -->
    <script src="js/album.js"></script>
</body>

</html>

<style>
body,
html {
    width: 100%;
    height: 142%;
    margin: 0;
    background-color: #121212;
    margin-bottom: 80px;
    background: linear-gradient(to bottom, #d8f6d2 0%, #121212 18%);
    font-family: 'Montserrat', sans-serif;
}

.container {
    position: relative;
}

.image {
    margin-top: 5%;
    text-align: center;
    width: 100%;
    padding: 20px 0;
}

.image img {
    width: 13em;
}

.title {
    margin-top: 5%;
    margin-left: 3%;
    color: white;
    text-align: left;
    font-size: x-large;
}

.description {
    color: white;
    display: flex;
    margin-left: 3%;
}

.option {
    display: flex;
    justify-content: space-between;
}

.option button {
    background-color: transparent;
    border: none;
}

.left-option {
    display: flex;
    margin-left: 10%;
    gap: 20%;
}

.left-option i {
    color: grey;
    font-size: 25px;
}

.right-option {
    display: flex;
    margin-right: 2%;
}

.right-option i {
    font-size: 25px;
    color: rgb(83, 246, 124);
}

.right-option #special-button {
    font-size: 40px;
}

.song-item {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    gap: 12px;
    cursor: pointer;
}

.song-cover {
    width: 48px;
    height: 48px;
    border-radius: 4px;
    object-fit: cover;
}

.song-info {
    display: flex;
    flex-direction: column;
    flex-grow: 1;
}

.song-title {
    color: white;
    font-size: 14px;
}

.song-artist {
    color: #b3b3b3;
    font-size: 12px;
}

.song-options button {
    color: rgb(70, 70, 70);
    background: transparent;
    border: none;
    font-size: 20px;
}

.song-bar {
    position: fixed;
    bottom: 10px;
    left: 0;
    right: 0;
    height: 56px;
    background-color: #1b1b1b;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 12px;
    border-radius: 8px;
}

.song-left {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 70%;
    overflow: hidden;
}

.song-left img {
    width: 40px;
    height: 40px;
    border-radius: 4px;
}

.song-details {
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

#song-title {
    color: white;
    font-size: 13px;
    font-weight: bold;
    white-space: nowrap;
}

#song-artist {
    color: #b3b3b3;
    font-size: 11px;
}

.song-control button {
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

.progress-container {
    position: absolute;
    bottom: 0;
    left: 10px;
    right: 10px;
    height: 2px;
    background: rgba(255, 255, 255, 0.1);
}

.progress {
    height: 100%;
    width: 0%;
    background: white;
    transition: width 0.1s;
}

.back-arrow {
    position: absolute;
    top: 8px;
    left: 8px;
    color: white;
    font-weight: bold;
    font-size: 22px;
    text-decoration: none;
    background-color: transparent;
}

.back-arrow i {
    padding: 10px;
    border-radius: 50%;
}
</style>
